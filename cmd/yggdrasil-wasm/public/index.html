<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yggdrasil Web Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #eee; padding: 10px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #ccc; }
        #url-input { flex-grow: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        #go-btn { padding: 8px 16px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #content-frame { flex-grow: 1; border: none; width: 100%; }
        #status { font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div id="toolbar">
        <span id="status">Initializing...</span>
        <input type="text" id="url-input" placeholder="Enter .ygg or 0200:: address (e.g., http://[0200::1])" value="http://[0200::1]/">
        <button id="go-btn">Go</button>
    </div>
    <iframe id="content-frame" src="about:blank"></iframe>

    <script src="wasm_exec.js"></script>
    <script src="app.js"></script>
</body>
</html>
